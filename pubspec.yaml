version: 1.0.0+2
name: phones_store_flutter
description: Flutter foundation for the PhoneMarket marketplace application.
publish_to: 'none'

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  easy_localization: ^3.0.8
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.5
  image_picker: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^3.2.3
  json_serializable: ^6.11.1

flutter:
  default-flavor: development
  uses-material-design: true
  assets:
    - assets/translations/
